<button appShortcut="C" title="Color (C)" mat-icon-button class="material-symbols-outlined"
  (click)="isOpen = !isOpen"
  type="button" cdkOverlayOrigin #trigger="cdkOverlayOrigin">
  <mat-icon fontSet="material-icons-outlined">format_color_fill</mat-icon>
</button>

<ng-template cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen">
  <div class="color-list">
    @for (color of COLORS; track color; let i = $index) {
      <span>
        <button class="color-picker" style="background-color: {{ color }};" (click)="selectColor(color)"></button>
        @if ((i + 1) % 5 === 0 && i !== COLORS.length - 1) {
          <br>
          }
        </span>
      }
    </div>
  </ng-template>
